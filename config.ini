[App]
# Общие параметры приложения
connection_timeout_ms=10000
poll_interval_ms=200

[Crate]
# Пусто = использовать первый найденный крейт
serial=

[LTR11]
enabled=true
# Пусто = автоопределение слота по MID
slot=
receive_timeout_ms=3000

# Настройки АЦП
start_mode=internal
input_mode=internal
logical_channel_count=1
# Формат значения: (mode<<6)|(range<<4)|phy_channel
logical_channel_0=0
adc_prescaler=1
adc_divider=149

[LTR114]
enabled=true
# Пусто = автоопределение слота по MID
slot=
receive_timeout_ms=3000

# В коде запрашивается 301, затем используется 0 при выходе за диапазон [0..15]
requested_physical_channel=301
fallback_physical_channel=0
meas_mode=u
urange=04

freq_divider=4
sync_mode=internal
interval=0

# Обработка и вывод
correction_mode=init
procf_value=true
thermo_preview_count=20
